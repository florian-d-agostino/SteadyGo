<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteadyGo - Événements</title>

    <link rel="stylesheet" href="../sass/style_main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <aside class="background-stripes"></aside>

    <!-- Background with stars -->
    <aside class="stars"></aside>

    <!-- Header -->
    <header class="top-header">
        <figure class="logo-container">
            <img src="../assets/img/SG%20Logo.png" alt="Logo SteadyGo" class="logo-dark">
            <img src="../assets/img/SG%20Logo.png" alt="Logo SteadyGo" class="logo-light">
        </figure>

        <h1 class="header-title">SteadyGo</h1>

        <section class="theme-toggle-container">
            <label class="theme-switch" for="theme-checkbox">
                <input type="checkbox" id="theme-checkbox" aria-label="Basculer entre le thème sombre et clair">
                <span class="slider">
                    <span class="slider-icon sun"><i class="fa-solid fa-sun"></i></span>
                    <span class="slider-icon moon"><i class="fa-solid fa-moon"></i></span>
                </span>
            </label>
        </section>

        <span class="header-curve"></span>

        <nav class="desktop-nav">
            <a href="../index.html" class="nav-link">Accueil</a>
            <a href="./news.html" class="nav-link">News</a>
            <a href="./event.html" class="nav-link active">Événements</a>
            <a href="./partner.html" class="nav-link">Partenaires</a>
        </nav>
        <input type="checkbox" id="burger-checkbox" class="burger-checkbox" style="display:none;">
        <label for="burger-checkbox" class="menu-icon" role="button" tabindex="0"
            aria-label="Ouvrir le menu de navigation">
            <i class="fa-solid fa-bars fa-2x"></i>
        </label>
    </header>

    <!-- Main -->
    <main class="main-container events-page-container">
        <section class="events-top-controls">
            <nav class="categories-wrapper">
                <input type="checkbox" id="categories-checkbox" class="categories-toggle-checkbox"
                    style="display:none;">
                <label for="categories-checkbox" class="button-categories" id="categories-btn" role="button"
                    tabindex="0" aria-label="Filtrer les événements par catégorie"
                    aria-haspopup="listbox">Catégories</label>
                <label for="categories-checkbox" class="categories-overlay-close"
                    style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:90; cursor:default;"></label>
                <menu class="categories-menu" id="categories-menu">
                    <label for="categories-checkbox" class="category-option" data-category="Tous">Tous</label>
                    <label for="categories-checkbox" class="category-option" data-category="Sportif">Sportif</label>
                    <label for="categories-checkbox" class="category-option" data-category="Concert">Concert</label>
                    <label for="categories-checkbox" class="category-option" data-category="Famille">Famille</label>
                    <label for="categories-checkbox" class="category-option" data-category="Festival">Festival</label>
                </menu>
            </nav>

            <section class="action-bar">
                <section class="date-input-container">
                    <button class="arrow-btn-prev" aria-label="Jour précédent"><i
                            class="fa-solid fa-circle-arrow-left"></i></button>
                    <time class="date-display">
                        <span id="date-text">29 Avril 2026</span>
                    </time>
                    <button class="arrow-btn-next" aria-label="Jour suivant"><i
                            class="fa-solid fa-circle-arrow-right"></i></button>
                </section>
                <button class="calendar-btn" aria-label="Ouvrir le calendrier pour choisir une date">
                    <i class="fa-regular fa-calendar"></i>
                </button>
            </section>
        </section>

        <!-- Carousel -->
        <section class="switcher">
            <button class="switcher-left" id="prev-event" aria-label="Événement précédent"><i
                    class="fa-solid fa-chevron-left"></i></button>

            <section class="cards-viewport">
                <ul class="cards-container" id="events-container">
                </ul>
            </section>

            <button class="switcher-right" id="next-event" aria-label="Événement suivant"><i
                    class="fa-solid fa-chevron-right"></i></button>
        </section>

        <!-- Grid title -->
        <section class="all-events-divider">
            <span class="divider-line"></span>
            <h2>Tous les événements</h2>
            <span class="divider-line"></span>
        </section>

        <!-- Grid -->
        <section class="all-events-grid" id="events-grid">
        </section>

    </main>

    <!-- Footer -->
    <footer class="bottom-nav">
        <span class="footer-curved"></span>

        <nav class="nav-items-container">
            <a href="../index.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Accueil</span>
            </a>
            <a href="./news.html" class="nav-item">
                <i class="fa-solid fa-newspaper"></i>
                <span>News</span>
            </a>
            <a href="./event.html" class="nav-item active">
                <i class="fa-solid fa-star"></i>
                <span>Événements</span>
            </a>
            <a href="./partner.html" class="nav-item">
                <i class="fa-solid fa-handshake"></i>
                <span>Partenaires</span>
            </a>
        </nav>
    </footer>

    <!-- Burger Menu -->
    <aside id="burger-menu" class="burger-overlay">
        <section class="menu-content">
            <label for="burger-checkbox" class="close-menu" role="button" tabindex="0"
                aria-label="Fermer le menu de navigation">&times;</label>
            <nav class="menu-nav">
                <a href="../index.html" class="menu-link">Accueil</a>
                <a href="./news.html" class="menu-link">News</a>
                <a href="./event.html" class="menu-link">Événements</a>
                <a href="./partner.html" class="menu-link">Partenaires</a>
            </nav>
        </section>
    </aside>

    <!--Calendar -->
    <section id="calendar-modal" class="calendar-overlay">
        <section class="calendar-container">
            <header class="calendar-header">
                <button id="prev-month" aria-label="Mois précédent"><i class="fa-solid fa-chevron-left"></i></button>
                <h2 id="current-month-year">Avril 2026</h2>
                <button id="next-month" aria-label="Mois suivant"><i class="fa-solid fa-chevron-right"></i></button>
            </header>
            <ul class="calendar-weekdays">
                <li>Lun</li>
                <li>Mar</li>
                <li>Mer</li>
                <li>Jeu</li>
                <li>Ven</li>
                <li>Sam</li>
                <li>Dim</li>
            </ul>
            <ul id="calendar-days" class="calendar-days">
            </ul>
        </section>
    </section>

    <script src="../js/api.js"></script>
    <script src="../js/menu.js"></script>
    <script src="../js/calendar.js"></script>
    <script src="../js/event_page.js"></script>
</body>

</html>
